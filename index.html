<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Arden'in Araba Galerisi</title>
    <!-- ... (CSS kısmı aynı kalabilir, sadece oyun modüllerini ekliyoruz) ... -->
    <style>
        /* ... (Önceki CSS'leriniz) ... */
        /* Yeni Modül İçin Stil */
        #game-identify { background: #E0F7FA; display: flex; flex-direction: column; align-items: center; }
        .car-display-img { 
            width: 90%; 
            max-width: 400px; 
            height: 250px; 
            background: #fff; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            border: 5px solid #00BCD4;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .car-options { display: grid; grid-template-columns: 1fr; gap: 15px; width: 90%; }
        .car-btn { padding: 20px; font-size: 20px; border-radius: 15px; border: none; background: #fff; box-shadow: 0 4px 0 #00838F; }
    </style>
</head>
<body>

    <!-- ... (Menü ekranına yeni buton ekleyin) ... -->
    <!-- Menu Grid içine şunu ekleyin: -->
    <div class="menu-card card-araba" onclick="switchScreen('game-identify', startIdentifyGame)">
        <div class="icon">🔍</div>
        <span>Araba Bul</span>
    </div>

    <!-- Oyun Ekranını Ekleyin -->
    <div id="game-identify" class="screen">
        <button class="back-btn" onclick="exitToMenu()">🏡 Çıkış</button>
        <div class="game-title">Bu Kimin Arabası?</div>
        <div class="car-display-img" id="display-area">
            <!-- Fotoğraf buraya gelecek -->
        </div>
        <div class="car-options" id="options-area"></div>
    </div>

    <script>
        // BURAYA KENDİ FOTOĞRAFLARINIZI EKLEYİN!
        const carCatalog = [
            { name: "Berkay'ın Arabası", src: "images/berkay_araba.jpg" },
            { name: "Baba'nın Arabası", src: "images/baba_araba.jpg" },
            { name: "İtfaiye", src: "images/itfaiye.jpg" }
        ];

        function startIdentifyGame() {
            if(carCatalog.length < 2) {
                speak("Önce garaja araba eklememiz lazım.");
                return;
            }
            showRandomCar();
        }

        function showRandomCar() {
            const randomIndex = Math.floor(Math.random() * carCatalog.length);
            const car = carCatalog[randomIndex];
            
            const area = document.getElementById('display-area');
            area.innerHTML = `<img src="${car.src}" style="max-height:100%; border-radius:15px;" onerror="this.src='https://via.placeholder.com/200?text=Foto+Ekle'">`;

            const options = document.getElementById('options-area');
            options.innerHTML = '';
            
            // Seçenekleri oluştur
            carCatalog.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'car-btn';
                btn.textContent = c.name;
                btn.onclick = () => {
                    if(c.name === car.name) {
                        speak("Aferin Arden! Bildin, bu " + car.name);
                        setTimeout(showRandomCar, 2000);
                    } else {
                        speak("O değil, tekrar dene bakalım!");
                    }
                };
                options.appendChild(btn);
            });
        }
    </script>
</body>
</html>
